text_sensor:
  - platform: template
    name: "Aero Â· CÃ³digos averÃ­a"
    update_interval: 30s
    lambda: |-
      uint16_t r[6] = { (uint16_t) id(aero_err0).state, (uint16_t) id(aero_err1).state,
                        (uint16_t) id(aero_err2).state, (uint16_t) id(aero_err3).state,
                        (uint16_t) id(aero_err4).state, (uint16_t) id(aero_err5).state };
      std::string s;
      for (int i = 0; i < 6; i++) {
        for (int b = 0; b < 16; b++) {
          if (r[i] & (1 << b)) { char c[8]; sprintf(c, "E%02d ", i*16 + b + 1); s += c; }
        }
      }
      if (s.empty()) return {"Ninguna"};
      return {s};
  - platform: template
    name: "Aero Â· CÃ³digos protecciÃ³n"
    update_interval: 30s
    lambda: |-
      uint16_t r[5] = { (uint16_t) id(aero_prot0).state, (uint16_t) id(aero_prot1).state,
                        (uint16_t) id(aero_prot2).state, (uint16_t) id(aero_prot3).state,
                        (uint16_t) id(aero_prot4).state };
      std::string s;
      for (int i = 0; i < 5; i++) {
        for (int b = 0; b < 16; b++) {
          if (r[i] & (1 << b)) { char c[8]; sprintf(c, "P%02d ", i*16 + b + 1); s += c; }
        }
      }
      if (s.empty()) return {"Ninguna"};
      return {s};
 
  - platform: template
    name: "Aero Â· Modo de control"
    update_interval: 30s
    lambda: |-
      int m = (int) id(aero_ctrl_mode_raw).state;
      if (m==0) return {"Agua fija"};
      if (m==1) return {"Agua + curva"};
      if (m==2) return {"Ambiente fija"};
      if (m==3) return {"Ambiente + curva"};
      return {"?"};

# === CONTROL AEROTERMIA (escritura 4X holding) â Zona 1 unica ===
select:
  - platform: modbus_controller
    modbus_controller_id: aero
    name: "Aero Â· Modo"
    address: 2100
    value_type: U_WORD
    optionsmap:
      "CalefacciÃ³n": 2
      "RefrigeraciÃ³n": 1
      "AutomÃ¡tico": 4
  - platform: template
    name: "Aero Â· Silencio"
    id: aero_silencio
    optimistic: false
    options:
      - "Apagado"
      - "Nivel 1"
      - "Nivel 2"
    lambda: |-
      uint16_t v = (uint16_t) id(reg2103).state;
      uint8_t s = (v >> 4) & 0x03;
      if (s == 2) return std::string("Nivel 2");
      if (s == 1) return std::string("Nivel 1");
      return std::string("Apagado");
    set_action:
      - lambda: |-
          uint16_t v = (uint16_t) id(reg2103).state;
          v &= ~0x0030;
          if (x == "Nivel 1") v |= 0x0010;
          else if (x == "Nivel 2") v |= 0x0020;
          auto c = id(reg2103).make_call();
          c.set_value(v);
          c.perform();


