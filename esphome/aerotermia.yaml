esphome:
  name: aerotermiabus
  friendly_name: "Aerotermia RS485"

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE
  manual_ip:
    static_ip: 192.168.1.XX   # cambia por la IP fija que quieras (o usa DHCP y borra manual_ip)
    gateway: 192.168.1.1
    subnet: 255.255.255.0
    dns1: 192.168.1.1

  ap:
    ssid: !secret ap_ssid
    password: !secret ap_password

captive_portal:

# === MODBUS LECTURA â Aerotermia KOSNER AQUARIS D HT R290 ===
# Cableado: H1->A+  H2->B-  | 9600 8N2 | dir 251 | func 0x04 (3X) | invertir H1/H2 si no comunica
uart:
  id: mod_uart
  tx_pin: GPIO17
  rx_pin: GPIO18
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 2

modbus:
  id: modbus1
  uart_id: mod_uart
  flow_control_pin: GPIO21

modbus_controller:
  - id: aero
    address: 251
    modbus_id: modbus1
    update_interval: 30s
    command_throttle: 100ms

